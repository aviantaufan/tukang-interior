<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Portfolio & Cafe Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #f5f5f5;
            --text-muted: #8a8a8a;
            --accent: #c5a880;
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
        }

        /* Container & Layout */
        .portfolio-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-b: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .brand-logo {
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .slide-eyebrow {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            text-align: right;
            transition: opacity 0.4s ease;
        }

        main {
            display: grid;
            grid-template-columns: 1.1sfr 0.9fr;
            gap: 60px;
            align-items: center;
            margin: auto 0;
        }

        @media (max-width: 968px) {
            main {
                grid-template-columns: 1fr;
                gap: 40px;
                margin: 20px 0;
            }
            body {
                overflow-y: auto;
            }
        }

        /* Content Styles */
        .content-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .category-tag {
            align-self: flex-start;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background-color: #161616;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            color: var(--accent);
            font-weight: 500;
        }

        .slide-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 6vw, 5.5rem);
            line-height: 1.05;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .slide-title span {
            display: block;
        }

        .meta-info {
            display: flex;
            gap: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .meta-info strong {
            color: var(--text-main);
            font-weight: 500;
        }

        .slide-description {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #cccccc;
            max-w: 540px;
        }

        /* Awards section */
        .awards-container {
            margin-top: 10px;
        }

        .awards-title {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .awards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .award-card {
            background: #111;
            padding: 15px;
            border-left: 2px solid var(--accent);
        }

        .stars {
            color: #f39c12;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .award-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .award-quote {
            font-size: 0.8rem;
            font-style: italic;
            color: var(--text-muted);
        }

        /* Visual Column */
        .visual-section {
            position: relative;
            aspect-ratio: 4 / 5;
            width: 100%;
            max-height: 650px;
            background-color: #111;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .slide-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.8s ease;
            transform: scale(1.05);
            position: absolute;
            top: 0;
            left: 0;
        }

        .slide-image.active {
            opacity: 0.85;
            transform: scale(1);
            z-index: 1;
        }

        .visual-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,10,10,0.8) 0%, transparent 40%);
            z-index: 2;
            pointer-events: none;
        }

        /* Footer & Navigation */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            margin-top: 40px;
        }

        .technical-stats {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .navigation-controls {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #333;
            color: var(--text-main);
            padding: 12px 24px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 500;
        }

        .nav-btn:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        /* Quick CSS Animation transition */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="portfolio-container">
        <!-- Header -->
        <header>
            <div class="brand-logo">Cinema Studio</div>
            <div class="slide-eyebrow" id="eyebrow">BLUEPRINT NO. 7</div>
        </header>

        <!-- Main Workspace -->
        <main>
            <!-- Left Side: Text Data -->
            <div class="content-section" id="content-area">
                <!-- Content injected dynamically via JS -->
            </div>

            <!-- Right Side: Image Display -->
            <div class="visual-section" id="image-area">
                <!-- Images injected dynamically via JS -->
                <div class="visual-overlay"></div>
            </div>
        </main>

        <!-- Footer Pagination -->
        <footer>
            <div class="technical-stats" id="tech-stats">
                FORMAT: 16MM · CRITICS: 94%
            </div>
            <div class="navigation-controls">
                <button class="nav-btn" onclick="changeSlide(-1)">PREV</button>
                <button class="nav-btn" onclick="changeSlide(1)">NEXT</button>
            </div>
        </footer>
    </div>

    <script>
        const SLIDES = [
            {
                id: "blueprint-no-seven",
                eyebrow: "TRUE/FALSE · TRUE LIFE FUND 2024",
                category: "HYBRID DOCUMENTARY",
                titleLines: ["BLUEPRINT", "NO. 7"],
                year: "2024",
                director: "SAM BINNS",
                imageSrc: "https://images.unsplash.com/photo-1610847455028-9e55e62bac33?auto=format&fit=crop&w=1200&q=80",
                awards: [
                    { stars: 5, label: "TRUE LIFE FUND", quote: "A PORTRAIT OF NOW" },
                    { stars: 4, label: "BEST FIRST FEATURE", quote: "RAW & UNNERVING" },
                    { stars: 5, label: "CRITICS PRIZE", quote: "ESSENTIAL VIEWING" }
                ],
                description: "An architect of the everyday traces seven anonymous lives across a single city block. Captured in long, unblinking takes, the film constructs an atlas of urban intimacy — strangers passing as a single organism.",
                stats: "FORMAT: 16MM | RUNTIME: 1h 38m | CRITICS: 94% | ASPECT: 1.66:1"
            },
            {
                id: "atlas-unfolds",
                eyebrow: "BERLINALE · ENCOUNTERS 2023",
                category: "ESSAY FILM",
                titleLines: ["ATLAS", "UNFOLDS"],
                year: "2023",
                director: "ELIAS NORÉN",
                imageSrc: "https://images.unsplash.com/photo-1596956708072-8ca0c2973887?auto=format&fit=crop&w=1200&q=80",
                awards: [
                    { stars: 5, label: "BEST CINEMATOGRAPHY", quote: "AN OPULENT CANVAS" },
                    { stars: 4, label: "ENCOUNTERS PRIZE", quote: "STUNNING IN RESTRAINT" },
                    { stars: 5, label: "FIPRESCI PRIZE", quote: "A QUIET MASTERWORK" }
                ],
                description: "A four-year journey across the high passes of Central Asia, charted entirely on foot. Norén trades narration for breath and footstep — the sky is the protagonist, the path is the verse.",
                stats: "FORMAT: 65MM | RUNTIME: 2h 12m | CRITICS: 96% | ASPECT: 2.20:1"
            },
            {
                id: "the-long-quiet",
                eyebrow: "TIFF DOCS · PLATFORM 2024",
                category: "OBSERVATIONAL",
                titleLines: ["THE LONG", "QUIET"],
                year: "2024",
                director: "AMARA OKAFOR",
                imageSrc: "https://images.unsplash.com/photo-1633885274919-04b5af171f8c?auto=format&fit=crop&w=1200&q=80",
                awards: [
                    { stars: 5, label: "PLATFORM PRIZE", quote: "DEEPLY MOVING" },
                    { stars: 5, label: "BEST DIRECTOR", quote: "QUIETLY DEVASTATING" },
                    { stars: 4, label: "AUDIENCE AWARD", quote: "A PORTRAIT OF SILENCE" }
                ],
                description: "On the eve of a six-month return to silence, four Carmelite nuns open their shutters and their letters. Okafor's patient gaze finds devotion in the smallest gestures — the way light moves across a refectory.",
                stats: "FORMAT: DIGITAL 4K | RUNTIME: 1h 47m | CRITICS: 93% | ASPECT: 1.85:1"
            },
            {
                id: "windsor-cafe",
                eyebrow: "WINDSOR 2026",
                category: "CAFE",
                titleLines: ["EMBER &", "ASH"],
                year: "2026",
                director: "AVIANTALUFAN",
                imageSrc: "https://i.postimg.cc/G9td6Nwj/IMG-20260519-232608-264.jpg",
                awards: [
                    { stars: 5, label: "BEST ACTRESS", quote: "SHE BURNS THE FRAME" },
                    { stars: 5, label: "ORIZZONTI PRIZE", quote: "HAUNTING & PRECISE" },
                    { stars: 4, label: "BEST EDITING", quote: "BURNS LONG AFTER" }
                ],
                description: "A wildfire memoirist returns to the village she once burned down — to face the woman she was. Haverstein's chamber drama burns at one steady temperature, then explodes.",
                stats: "FORMAT: 35MM | RUNTIME: 1h 56m | CRITICS: 92% | ASPECT: 2.39:1"
            }
        ];

        let currentIndex = 0;

        function renderSlide(index) {
            const slide = SLIDES[index];
            
            // Eyebrow Update
            document.getElementById('eyebrow').innerText = slide.eyebrow;
            
            // Technical Stats Update
            document.getElementById('tech-stats').innerText = slide.stats;

            // Content Update
            const contentArea = document.getElementById('content-area');
            
            let titlesHTML = slide.titleLines.map(line => `<span>${line}</span>`).join('');
            
            let awardsHTML = slide.awards.map(aw => `
                <div class="award-card">
                    <div class="stars">${"★".repeat(aw.stars)}</div>
                    <div class="award-label">${aw.label}</div>
                    <div class="award-quote">"${aw.quote}"</div>
                </div>
            `).join('');

            contentArea.innerHTML = `
                <div class="fade-in" style="display: flex; flex-direction: column; gap: 24px;">
                    <span class="category-tag">${slide.category}</span>
                    <h1 class="slide-title">${titlesHTML}</h1>
                    <div class="meta-info">
                        <div><strong>SUTRADARA:</strong> ${slide.director}</div>
                        <div><strong>TAHUN:</strong> ${slide.year}</div>
                    </div>
                    <p class="slide-description">${slide.description}</p>
                    <div class="awards-container">
                        <div class="awards-title">Awards & Reviews</div>
                        <div class="awards-grid">${awardsHTML}</div>
                    </div>
                </div>
            `;

            // Image Update (With smooth fading cross-dissolve)
            const imageArea = document.getElementById('image-area');
            // Clear previous images except overlay
            const existingImages = imageArea.querySelectorAll('.slide-image');
            existingImages.forEach(img => img.remove());

            const imgEl = document.createElement('img');
            imgEl.src = slide.imageSrc;
            imgEl.alt = slide.id;
            imgEl.className = 'slide-image active';
            imageArea.appendChild(imgEl);
        }

        function changeSlide(direction) {
            currentIndex += direction;
            if (currentIndex >= SLIDES.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = SLIDES.length - 1;
            renderSlide(currentIndex);
        }

        // Initial Initialization
        window.addEventListener('DOMContentLoaded', () => {
            renderSlide(currentIndex);
        });
    </script>
</body>
</html>
